name: Dance
options:
  bundleIdPrefix: com.annyang
  deploymentTarget:
    iOS: "17.0"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
targets:
  Dance:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Dance
    info:
      path: Dance/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        CFBundleDisplayName: Studio Hop
        ITSAppUsesNonExemptEncryption: false
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "2"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCalendarsFullAccessUsageDescription: "Studio Hop needs calendar access to add dance classes to your calendar."
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.annyang.dance
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: Y2HHD36TDG
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: Supabase
        product: Supabase
schemes:
  Dance:
    build:
      targets:
        Dance: all
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
