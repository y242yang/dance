name: Daily scrape

on:
  schedule:
    # 13:07 UTC daily. GitHub cron is UTC-only and can't follow DST, so this is
    # 6:07am PDT (summer) / 5:07am PST (winter). The :07 minute (rather than :00)
    # avoids the top-of-hour congestion when GitHub delays scheduled runs.
    - cron: "7 13 * * *"
  workflow_dispatch: {}  # allow manual runs from the Actions tab

# If a scrape is already running, don't start an overlapping one.
concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    # Pinned to 22.04: Playwright 1.44's `--with-deps` installs libasound2, which was
    # renamed to libasound2t64 on ubuntu-24.04 ("noble", the current ubuntu-latest),
    # breaking browser install. 22.04 still ships libasound2. Revisit if Playwright is
    # upgraded to a noble-aware version (>=1.47).
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        working-directory: scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # ubuntu-latest is 2 vCPU / 7 GB; keep concurrent Chromium instances low.
          SCRAPE_CONCURRENCY: "3"
        run: python main.py
